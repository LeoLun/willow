name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string
      upload_release:
        description: 'Upload to GitHub Release'
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PNPM
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build monorepo packages
        run: pnpm build

      - name: Build and Package Mac App (x64)
        run: |
          cd app/work
          pnpm run make:mac:x64
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build and Package Mac App (arm64)
        run: |
          cd app/work
          pnpm run make:mac:arm64
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Extract app.asar for incremental update
        run: |
          cp app/work/out/*-darwin-arm64/Willow\ Work.app/Contents/Resources/app.asar app/work/out/app.asar || cp app/work/out/*-darwin-x64/Willow\ Work.app/Contents/Resources/app.asar app/work/out/app.asar
          ls -la app/work/out/app.asar

      - name: Check output files
        run: |
          ls -la app/work/out/make/dmg/darwin/x64/ || true
          ls -la app/work/out/make/dmg/darwin/arm64/ || true
          ls -la app/work/out/make/zip/darwin/x64/ || true
          ls -la app/work/out/make/zip/darwin/arm64/ || true

      - name: Create Release and Upload Assets
        if: ${{ inputs.upload_release == true }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: Release ${{ inputs.version }}
          files: |
            app/work/out/make/dmg/darwin/x64/*.dmg
            app/work/out/make/dmg/darwin/arm64/*.dmg
            app/work/out/make/zip/darwin/x64/*.zip
            app/work/out/make/zip/darwin/arm64/*.zip
            app/work/out/app.asar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
