name: Release

on:
  workflow_dispatch:
    inputs:
      upload_release:
        description: "Upload to GitHub Release"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PNPM
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Read version from package.json
        run: |
          VERSION=$(node -p "require('./app/work/package.json').version")
          echo "VERSION=v$VERSION" >> $GITHUB_ENV

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build monorepo packages
        run: pnpm build

      - name: Build and Package Mac App (x64)
        run: |
          cd app/work
          pnpm run make:mac:x64
          mv out/make/Willow\ Work.dmg out/make/Willow-Work-${{ env.VERSION }}-x64.dmg || true
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build and Package Mac App (arm64)
        run: |
          cd app/work
          pnpm run make:mac:arm64
          mv out/make/Willow\ Work.dmg out/make/Willow-Work-${{ env.VERSION }}-arm64.dmg || true
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Extract app.asar for incremental update
        run: |
          cp app/work/out/*-darwin-arm64/Willow\ Work.app/Contents/Resources/app.asar app/work/out/app.asar || cp app/work/out/*-darwin-x64/Willow\ Work.app/Contents/Resources/app.asar app/work/out/app.asar
          ls -la app/work/out/app.asar

      - name: Check output files
        run: |
          ls -la app/work/out/make/ || true
          ls -la app/work/out/make/zip/darwin/x64/ || true
          ls -la app/work/out/make/zip/darwin/arm64/ || true

      - name: Upload Packaged Artifacts to Actions Run
        uses: actions/upload-artifact@v7
        with:
          name: willow-build-${{ env.VERSION }}
          path: |
            app/work/out/make/*.dmg
            app/work/out/make/zip/darwin/x64/*.zip
            app/work/out/make/zip/darwin/arm64/*.zip
            app/work/out/app.asar

      - name: Create Release and Upload Assets
        if: ${{ inputs.upload_release == true }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          files: |
            app/work/out/make/*.dmg
            app/work/out/make/zip/darwin/x64/*.zip
            app/work/out/make/zip/darwin/arm64/*.zip
            app/work/out/app.asar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate latest.json
        if: ${{ inputs.upload_release == true }}
        run: |
          sleep 5
          mkdir -p dist-pages
          curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
               -H "Accept: application/vnd.github.v3+json" \
               https://api.github.com/repos/LeoLun/willow/releases/latest \
               -o dist-pages/latest.json
          node -e "const data = require('./dist-pages/latest.json'); if(!data.tag_name) throw new Error('Invalid JSON generated');"

      - name: Deploy to GitHub Pages
        if: ${{ inputs.upload_release == true }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist-pages
          publish_branch: gh-pages
          destination_dir: .
          keep_files: false
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "docs: update latest.json to ${{ env.VERSION }}"
